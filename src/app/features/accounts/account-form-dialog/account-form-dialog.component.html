<h2 mat-dialog-title>{{ isEdit ? 'Edit account' : 'Add account' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" id="account-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Account ID</mat-label>
      <input matInput formControlName="id" placeholder="e.g. CC-5792, Food" [readonly]="false" />
      @if (idError) {
        <mat-error>{{ idError }}</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        @for (t of types; track t) {
          <mat-option [value]="t">{{ t }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" type="submit" form="account-form">
    {{ isEdit ? 'Save' : 'Add' }}
  </button>
</mat-dialog-actions>
