<div class="accounts-header">
  <h1>Accounts</h1>
  <button mat-raised-button color="primary" (click)="openAddDialog()" aria-label="Add account">
    Add account
  </button>
</div>

@if (accounts().length > 0) {
  <table mat-table [dataSource]="accounts()" class="accounts-table">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Account ID</th>
      <td mat-cell *matCellDef="let row">{{ row.id }}</td>
    </ng-container>
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let row">{{ row.type }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-button (click)="openEditDialog(row)" aria-label="Edit account">Edit</button>
        <button mat-icon-button color="warn" (click)="deleteAccount(row)" aria-label="Delete account">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
} @else {
  <p class="empty">No accounts yet. Add an account or import expenses to create accounts automatically.</p>
}
